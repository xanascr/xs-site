services:
  app:
    build: .
    ports:
      - "3010:3010"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/xanascript
      - JWT_SECRET=${JWT_SECRET:-change-me}
      - NODE_ENV=production
      - PORT=3010
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
