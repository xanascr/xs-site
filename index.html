<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XanaScript</title>
<script>
(function() {
  var lang = (navigator.language || navigator.userLanguage || 'en').substring(0, 2);
  var map = { pt: '/pt/', es: '/es/' };
  window.location.replace(map[lang] || '/en/');
})();
</script>
</head>
<body>
<p>Redirecting...</p>
</body>
</html>
